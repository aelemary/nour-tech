<html lang="en">

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nour Tech | Catalog Search</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" type="image/png" href="/data/nourtechsmall.png" />
  </head>
  <body class="page-main">
    <header>
      <a class="logo" href="/" aria-label="Nour Tech home">
        <img src="/data/nourtechlogo.png" alt="Nour Tech logo" class="logo-mark" />
      </a>
      <button class="nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false" aria-controls="site-nav">Menu</button>
      <nav id="site-nav">
        <a href="/index.html">Inventory</a>
        <a href="/contact.html">Contact</a>
        <a href="/account.html" id="nav-account" data-requires-auth="true">My Orders</a>
        <a href="/cart.html" class="cart-link">Cart <span id="cart-count" class="cart-count">0</span></a>
        <a href="/admin.html" data-requires-role="admin">Admin</a>
        <span id="nav-user" class="nav-user" hidden></span>
        <a href="/signup.html" id="nav-signup">Sign Up</a>
        <a href="/login.html" id="nav-auth">Login</a>
      </nav>
      <form id="header-search" class="header-search" role="search">
        <input type="search" name="search" placeholder="Search catalog" aria-label="Search catalog" />
        <button type="submit">Search</button>
      </form>
    </header>

    <main>
      <section class="panel category-page-head">
        <a class="back-link" href="/index.html">Back to catalog</a>
        <h1 id="category-title">Catalog Search</h1>
        <p class="inventory-subtitle" id="category-subtitle">
          Refine products by keyword, brand, category, and visible specification text.
        </p>
      </section>

      <section class="panel category-filter-panel">
        <h2>Filters</h2>
        <form id="category-filter-form" class="filters-form">
          <label>
            Keywords
            <input type="search" id="filter-search" name="search" placeholder="Title, brand, or specs" />
          </label>
          <label>
            Category
            <select id="filter-category" name="category">
              <option value="">All categories</option>
            </select>
          </label>
          <label>
            Brand
            <select id="filter-company" name="companyId">
              <option value="">Any brand</option>
            </select>
          </label>
          <label>
            CPU
            <input type="text" name="cpu" placeholder="Intel, Ryzen, Ultra..." />
          </label>
          <label>
            GPU
            <input type="text" name="gpu" placeholder="RTX, Radeon, Intel..." />
          </label>
          <label>
            RAM / Memory
            <input type="text" name="ram" placeholder="16GB, DDR5..." />
          </label>
          <label>
            Storage / Capacity
            <input type="text" name="storage" placeholder="1TB, NVMe, SATA..." />
          </label>
          <div class="filter-actions">
            <button type="submit" class="btn btn-primary">Apply Filters</button>
            <button type="button" class="btn btn-outline" id="filter-reset">Reset</button>
          </div>
        </form>
        <div id="category-status" class="order-status"></div>
      </section>

      <section class="panel category-results-panel">
        <div class="catalog-heading">
          <h2 id="result-count">Products</h2>
          <span id="result-context"></span>
        </div>
        <div id="category-results" class="catalog-grid category-results-grid"></div>
        <div id="category-empty" class="empty-state" hidden>Nothing matched those filters.</div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-main">
        <a href="/" class="footer-logo-link" aria-label="Nour Tech home">
          <img src="/data/nourtechlogo.png" alt="Nour Tech" class="footer-logo" />
        </a>
      </div>
      <p class="footer-copy">Nour Tech &copy; <span id="year"></span>. Trusted hardware sourcing across MENA.</p>
    </footer>

    <script src="/auth.js" defer></script>
    <script src="/cart-storage.js" defer></script>
    <script src="/category.js" defer></script>
    <script src="/footer.js" defer></script>
    <script src="/nav.js" defer></script>
  </body>
</html>
